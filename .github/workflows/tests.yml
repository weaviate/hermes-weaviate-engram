name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install runtime dependency (engram SDK)
        run: pip install "weaviate-engram>=0.6,<1"

      - name: Install Hermes Agent (for MemoryProvider ABC + tool_error)
        # Hermes Agent isn't on PyPI; install from the public repo so the
        # plugin's `from agent.memory_provider import MemoryProvider` and
        # `from tools.registry import tool_error` imports resolve.
        run: pip install "hermes-agent @ git+https://github.com/NousResearch/hermes-agent.git@main"

      - name: Install dev dependencies
        run: pip install pytest pytest-timeout

      - name: Run tests
        run: pytest -v
