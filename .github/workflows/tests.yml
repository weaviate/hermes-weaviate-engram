name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          # `enable-cache: true` caches both the uv binary and dependency
          # downloads keyed by uv.lock — fast incremental CI.
          enable-cache: true

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies (hash-verified from uv.lock)
        # --locked refuses to update the lockfile in CI — if a manual edit
        # to pyproject.toml drifted from uv.lock the build fails fast.
        run: uv sync --locked --python ${{ matrix.python-version }}

      - name: Run tests
        run: uv run pytest -v
